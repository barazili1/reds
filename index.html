<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>APPLE HACK | Advanced Analytics</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              green: {
                500: 'var(--primary-color)',
              }
            },
            fontFamily: {
              sans: ['"Chakra Petch"', 'sans-serif'],
              display: ['"Goldman"', 'cursive'],
              accent: ['"Michroma"', 'sans-serif'],
              arabic: ['Cairo', 'sans-serif'],
              mono: ['"Share Tech Mono"', 'monospace'],
            },
            animation: {
              'glitch': 'glitch 1s linear infinite',
              'scan': 'scan 2s linear infinite',
              'fade-in-up': 'fadeInUp 0.5s ease-out forwards',
              'pulse-fast': 'pulse 1s cubic-bezier(0.4, 0, 0.6, 1) infinite',
            },
            keyframes: {
              glitch: {
                '2%, 64%': { transform: 'translate(2px,0) skew(0deg)' },
                '4%, 60%': { transform: 'translate(-2px,0) skew(0deg)' },
                '62%': { transform: 'translate(0,0) skew(5deg)' },
              },
              scan: {
                '0%': { transform: 'translateY(-100%)' },
                '100%': { transform: 'translateY(100%)' },
              },
              fadeInUp: {
                '0%': { opacity: '0', transform: 'translateY(10px)' },
                '100%': { opacity: '1', transform: 'translateY(0)' },
              }
            }
          }
        }
      }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Chakra+Petch:wght@300;400;500;600;700&family=Goldman:wght@400;700&family=Share+Tech+Mono&family=Michroma&display=swap" rel="stylesheet">
    <style>
      :root {
        --primary-color: #22c55e;
        --primary-color-rgb: 34, 197, 94;
        --primary-glow: rgba(var(--primary-color-rgb), 0.5);
      }
      body {
        font-family: '"Chakra Petch"', sans-serif;
        background-color: #000000;
        color: #e4e4e7;
        overflow: hidden;
      }
      /* Custom Scrollbar */
      ::-webkit-scrollbar {
        width: 4px;
      }
      ::-webkit-scrollbar-track {
        background: rgba(0, 0, 0, 0.2);
      }
      ::-webkit-scrollbar-thumb {
        background: var(--primary-color);
        border-radius: 10px;
      }
      .custom-scrollbar {
        scrollbar-width: thin;
        scrollbar-color: var(--primary-color) transparent;
      }
      .custom-scrollbar::-webkit-scrollbar {
        width: 4px;
      }
      .custom-scrollbar::-webkit-scrollbar-track {
        background: transparent;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb {
        background: var(--primary-glow);
        border-radius: 10px;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb:hover {
        background: var(--primary-color);
      }

      .font-display { font-family: 'Goldman', cursive; }
      .font-accent { font-family: 'Michroma', sans-serif; }
      .font-mono { font-family: 'Share Tech Mono', monospace; }

      .hud-text-glow {
        text-shadow: 0 0 10px var(--primary-glow);
      }
      
      .vip-gradient-text {
        background: linear-gradient(to bottom, #fff, var(--primary-color));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "@google/genai": "https://esm.sh/@google/genai@^1.34.0",
    "lucide-react": "https://esm.sh/lucide-react@^0.561.0",
    "path": "https://esm.sh/path@^0.12.7",
    "vite": "https://esm.sh/vite@^7.3.0",
    "@vitejs/plugin-react": "https://esm.sh/@vitejs/plugin-react@^5.1.2",
    "url": "https://esm.sh/url@^0.11.4"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>

    <div id="root"></div>

</body>
</html>
